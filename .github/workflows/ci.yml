name: CI - DevSecOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:

  # ============================================================
  # GATE 1: SECRET SCANNING (Gitleaks)
  # ============================================================

  gitleaks:
    name: Secret Scan - Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ============================================================
  # GATE 2: LINT - Checkstyle
  # ============================================================

  lint:
    name: Lint - Checkstyle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Checkstyle
        run: mvn checkstyle:check || true


  # ============================================================
  # GATE 3: SAST - Semgrep
  # ============================================================

  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    needs: [gitleaks, lint]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: |
            p/java
            p/owasp-top-ten
            p/secrets

    
  # ============================================================
  # GATE 4: SCA - OWASP Dependency Check
  # ============================================================

  sca:
    name: SCA - OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: [gitleaks, lint]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache OWASP DB
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}

      - name: Run Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mvn org.owasp:dependency-check-maven:check \
          -DfailBuildOnCVSS=7 \
          -DnvdApiKey="${NVD_API_KEY}"


  # ============================================================
  # GATE 5: BUILD & PUSH DOCKER IMAGE
  # ============================================================

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [sast, sca]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t naveenparihar0110/ai-banking:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push naveenparihar0110/ai-banking:${{ github.sha }}



  # ============================================================
  # GATE 6: UPDATE HELM VALUES (GitOps)
  # ============================================================

  update-helm:
    name: Update Helm values.yaml
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update image tag in values.yaml
        run: |
          sed -i "s/tag:.*/tag: \"${{ github.sha }}\"/" helm/bankapp-chart/values.yaml

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add helm/bankapp-chart/values.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push          


